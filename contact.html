<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="container">
        <div class="brand">
            <h1>Aayu<span style="color: #f2c94c; font-style: normal;">SH</span></h1>
            <p>Web Developer</p>
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="mailto:connects.aayush@gmail.com" class="email" style="color: #12181f;">Email</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact">
            <div class="contact-text">
                <h2>Get In Touch With Aayu<span style="color: #f2c94c;">SH</span></h2>
                <p style="color: #f2c94c; border: 1px solid #e8e3d3; margin: 0px 300px; border-radius: 4px;">LEAVE US A MESSAGE</p>
            </div>
            <form class="form" style="border: #f2c94c 1px solid;" onsubmit="showmessage(event)">
                <label for="name">Full Name :</label>
                <input type="text" placeholder="Enter Your Full Name" required>
                <label for="address">Address :</label>
                <input type="text" placeholder="Address" required>
                <label for="email">Email :</label>
                <input type="email" placeholder="example@gmail.com" required>
                <label for="phonenumber">Phone Number :</label>
                <input type="tel" placeholder="+977 XXXXXXXXXX" id="">
                <label for="service">Select Service :</label>
                <select name="" id="">
                    <option value=""></option>
                    <option value="">SEO</option>
                    <option value="">Web Development</option>
                    <option value="">Graphics Designing</option>
                    <option value="">Digital Marketting</option>
                </select>
                <div class="gender">
                    <label for="">Gender :</label>
                    <input type="radio" name="gender">
                    <label for="Female">Male</label>
                    <input type="radio" name="gender">
                    <label for="Female">Female</label>
                    <!-- <input type="radio" name="gender">
                    <label for="Female">Lesbian</label> -->
                    <input type="radio" name="gender">
                    <label for="Female">Others</label>
                </div>
                <div class="message-box">
                    <label for="message">Message</label>
                    <textarea name="messgae" rows="5" placeholder="Leave your Message."></textarea>
                </div>
                
                 <button class="send-button">Send Message</button>
            </form>
           
        </section>
        

    </main>
      <footer class="footer">
        <p>© 2026 Aayush Karki. All rights reserved.</p>
      </footer>
     <script src="script.js"></script>
</body>
</html>
